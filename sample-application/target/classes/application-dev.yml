server:
    # 服务器的HTTP端口，默认为8080
    port: 9000
# 数据源配置
spring:
    datasource:
        type: com.alibaba.druid.pool.DruidDataSource
        driverClassName: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://106.53.112.43:3306/sample_dev?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
        username: root
        password: aLo:ZkJf{6@4
        druid:
            # 初始连接数
            initialSize: 5
            # 最小连接池数量
            minIdle: 10
            # 最大连接池数量
            maxActive: 20
            # 配置获取连接等待超时的时间
            maxWait: 60000
            # 配置连接超时时间
            connectTimeout: 30000
            # 配置网络超时时间
            socketTimeout: 60000
            # 配置间隔多久才进行一次检测，检测需要关闭的空闲连接，单位是毫秒
            timeBetweenEvictionRunsMillis: 60000
            # 配置一个连接在池中最小生存的时间，单位是毫秒
            minEvictableIdleTimeMillis: 300000
            # 配置一个连接在池中最大生存的时间，单位是毫秒
            maxEvictableIdleTimeMillis: 900000
            # 配置检测连接是否有效
            validationQuery: SELECT 1 FROM DUAL
            testWhileIdle: true
            testOnBorrow: false
            testOnReturn: false
            webStatFilter: 
                enabled: true
            statViewServlet:
                enabled: true
                # 设置白名单，不填则允许所有访问
                allow:
                url-pattern: /druid/*
                # 控制台管理用户名和密码
                login-username: admin
                login-password: 123456
            filter:
                stat:
                    enabled: true
                    # 慢SQL记录
                    log-slow-sql: true
                    slow-sql-millis: 3000
                    merge-sql: true
                wall:
                    config:
                        multi-statement-allow: true
    data:
        redis:
            host: ${REDIS_HOST:106.53.112.43}
            # 端口，默认为6379
            port: 6379
            # 数据库索引
            database: 0
            # 连接超时时间
            timeout: 60s
            lettuce:
                pool:
                    # 连接池中的最小空闲连接
                    min-idle: 1
                    # 连接池中的最大空闲连接
                    max-idle: 10
                    # 连接池的最大数据库连接数
                    max-active: 20
                    # #连接池最大阻塞等待时间（使用负值表示没有限制）
                    max-wait: -1ms